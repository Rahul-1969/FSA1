name: ML CI Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"

    - name: Run Tests
      run: pytest

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Build Docker Image
      run: docker build -t lr-devops-demo .

    - name: Run Docker Container
      run: docker run lr-devops-demo